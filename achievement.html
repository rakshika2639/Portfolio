  <style>
    :root{
      --bg0:#0a0e17; --bg1:#0d1117; --panel:rgba(22,27,34,.78); --panel-2:rgba(22,27,34,.9);
      --border:#24313a; --text:#c9d1d9; --muted:#9fb3c8; --brand:#58a6ff; --accent:#00ffa7; --accent2:#1f6feb;
    }
    *{box-sizing:border-box}
    body{margin:0;display:flex;min-height:100vh;color:var(--text);
      background:radial-gradient(circle at 20% 30%, rgba(88,166,255,.08) 0%, transparent 50%),
                 radial-gradient(circle at 80% 70%, rgba(10,247,10,.06) 0%, transparent 50%),
                 radial-gradient(circle at 50% 10%, rgba(255,0,255,.04) 0%, transparent 50%),
                 linear-gradient(135deg,var(--bg0) 0%, var(--bg1) 100%);
      overflow:hidden}

    /* Sidebar */
    .sidebar{width:280px;background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#0d1117 100%);color:#fff;display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;border-right:3px solid #30363d;transform:perspective(1200px) rotateY(-3deg);transform-origin:right center;box-shadow:8px 0 25px rgba(0,0,0,.6),inset -8px 0 25px rgba(0,0,0,.4),0 0 60px rgba(88,166,255,.15),inset 0 0 0 1px rgba(88,166,255,.1);backdrop-filter:blur(10px)}
    .logo{padding:30px 25px;text-align:center;border-bottom:2px solid #30363d;background:linear-gradient(135deg,rgba(13,17,23,.95),rgba(22,27,34,.95));position:relative}
    .logo h1{margin:0;font-size:1.5rem;font-weight:800;letter-spacing:2px;background:linear-gradient(90deg,var(--brand),#1f6feb);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .nav-menu{flex:1;padding:30px 0;overflow-y:auto}
    .nav-menu ul{list-style:none;margin:0;padding:0}
    .nav-menu a{display:flex;align-items:center;gap:12px;margin:6px 12px;padding:14px 22px;border-radius:10px;text-decoration:none;color:#c9d1d9;background:linear-gradient(135deg,rgba(33,37,43,.75),rgba(22,27,34,.75));border-left:4px solid transparent;transition:.25s;box-shadow:inset 0 1px 0 rgba(255,255,255,.08), inset 0 -1px 0 rgba(0,0,0,.2)}
    .nav-menu i{width:22px;text-align:center}
    .nav-menu a:hover{color:var(--brand);border-left-color:var(--brand);transform:translateY(-2px)}
    .nav-menu .active a{color:var(--brand);border-left-color:var(--brand);background:linear-gradient(135deg,rgba(31,111,235,.25),rgba(88,166,255,.35))}
    .footer{padding:18px;border-top:2px solid #30363d;text-align:center;color:#8b949e}

    /* Main */
    .main{flex:1;margin-left:280px;min-height:100vh;position:relative;overflow:auto;padding:36px}

    /* Content Container */
    .achievement-container{max-width:900px;margin:0 auto}
    .achievement-title{font-family:'Courier New',monospace;font-size:clamp(1.8rem,5vw,2.2rem);font-weight:900;color:var(--accent);text-shadow:0 0 12px rgba(0,255,167,.45);margin:0 0 10px;letter-spacing:.5px}
    .achievement-desc{color:#b8c2cc;line-height:1.7;margin-bottom:24px}

    .achievement-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px 22px;box-shadow:0 10px 25px rgba(0,0,0,.35);display:flex;justify-content:center;align-items:center}
    .achievement-card iframe{max-width:100%;border-radius:8px}
    .embed-wrap{width:100%;display:flex;justify-content:center}
    .ln-fallback{display:none;align-items:center;justify-content:center;padding:40px;border-radius:10px;width:100%;max-width:720px;background:linear-gradient(135deg,rgba(13,17,23,.65),rgba(22,27,34,.68));border:1px solid rgba(88,166,255,.06)}
    .fallback-link{display:inline-flex;align-items:center;gap:12px;padding:14px 20px;background:linear-gradient(90deg,var(--brand),var(--accent));color:#071022;border-radius:10px;font-weight:800;text-decoration:none;box-shadow:0 12px 30px rgba(0,0,0,.45);font-size:1rem}
    .fallback-link i{font-size:1.35rem}

    @media(max-width:1100px){.main{padding:24px}}
    @media(max-width:992px){.sidebar{width:90px}.main{margin-left:90px}.nav-menu a span{display:none}}
    @media(max-width:576px){.sidebar{width:70px}.main{margin-left:70px;padding:24px}.achievement-title{font-size:1.8rem}}
  </style>

  <script src="assets/js/nav-toggle.js"></script>
  <script>
    (function(){
      const iframe = document.getElementById('ln-embed');
      const fallback = document.getElementById('ln-fallback');
      let loaded = false;

      // If iframe load isn't usable due to CORS or LinkedIn blocking, show a clear fallback
      iframe.addEventListener('load', () => {
        try {
          const doc = iframe.contentDocument || iframe.contentWindow.document;
          if (doc && doc.body && doc.body.childNodes.length > 0) {
            loaded = true;
            fallback.style.display = 'none';
            iframe.style.display = 'block';
            return;
          }
        } catch (e) {
          // cross-origin access will throw — assume embed attempted, wait briefly then show fallback if still blank
          setTimeout(() => {
            try {
              const doc = iframe.contentDocument || iframe.contentWindow.document;
              if (!doc || !doc.body || doc.body.childNodes.length === 0) {
                iframe.style.display = 'none';
                fallback.style.display = 'flex';
              }
            } catch (e) {
              iframe.style.display = 'none';
              fallback.style.display = 'flex';
            }
          }, 800);
        }
        // If DOM present but empty, show fallback after short delay
        setTimeout(() => {
          if (!loaded) {
            iframe.style.display = 'none';
            fallback.style.display = 'flex';
          }
        }, 1200);
      });

      // Safety net: if nothing happens within 2s, show fallback
      setTimeout(() => {
        if (!loaded) {
          iframe.style.display = 'none';
          fallback.style.display = 'flex';
        }
      }, 2000);
    })();
  </script>
